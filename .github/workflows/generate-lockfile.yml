name: Generate Package Lockfile

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies and generate lockfile
        run: |
          npm install --legacy-peer-deps

      - name: Commit and push package-lock.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: generate package-lock.json with prisma 6.19.0 [skip ci]" || echo "No changes to commit"
          git push origin main
